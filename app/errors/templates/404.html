{% extends "base.html" %}

{% block content %}

    <div class="container-fluid d-flex flex-column justify-content-center align-items-center text-center" style="height: 80vh;">
        <!-- 404 Icon -->
        <div class="mb-4">
            <i class="bi bi-geo-alt-fill text-danger" style="font-size: 6rem;"></i>
        </div>

        <!-- Error Text -->
        <h1 class="display-1 fw-bold">404</h1>
        <h2 class="mb-2">Page Not Found</h2>
        <p class="mb-5">The page you are looking for does not exist or has been moved.</p>

        <!-- Home Button -->
        <a href="{{ url_for('core.home') }}" class="btn btn-primary btn-lg">Go to Homepage</a>
    </div>

{% endblock %}
